<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Paste</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="main-title">Private and free pastebin</h1>
    <h1 class="create-paste-title">Create New Paste</h1>
    <div class="container">
        <form action="create.php" method="POST" id="pasteForm">
            <div class="form-group">
                <label for="content">Paste Content:</label>
                <textarea name="content" id="content" rows="10" cols="50" required></textarea>
            </div>
            <div class="form-group">
                <label for="expire">Expires In:</label>
                <select name="expire" id="expire">
                    <option value="1_day">1 Day</option>
                    <option value="1_week">1 Week</option>
                    <option value="1_month">1 Month</option>
                </select>
            </div>
            <div class="form-group">
                <label for="password">Password (Optional):</label>
                <input type="password" name="password" id="password">
            </div>
            <div class="form-group">
                <label for="burn_after_read">Burn After Reading:</label>
                <input type="checkbox" name="burn_after_read" id="burn_after_read" value="1">
            </div>
            <div class="form-group">
                <input type="submit" value="Create Paste">
            </div>
        </form>
        <div id="resultMessage" class="form-group" style="margin-top: 20px;"></div>
    </div>
    <script src="script.js"></script>
    <footer>
      <img src="images/logopaste.png" alt="Logo" style="max-width: 100%; height: auto;" />
      <p>This is an open source pastebin by <a href="https://witty.computer">Witty Computer</a>.</p>
    </footer>
</body>
</html>
